name: Build macOS Executable

on:
  release:
    types: [published] # This is the "clean" way to trigger it

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy soundfile

      - name: Build with PyInstaller
        # IMPORTANT: Replace 'stem_checker.py' below if your file is named differently
        run: |
          python -m PyInstaller --onefile --windowed stem_checker.py

      - name: Upload macOS Binary to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/stem_checker
          asset_name: stem_checker_mac
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
