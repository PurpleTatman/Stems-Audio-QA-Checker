name: Build macOS Executable

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller numpy soundfile

      - name: Build with PyInstaller
        # Make sure the filename below matches your .py file exactly
        run: |
          python -m PyInstaller --onefile --windowed stem_checker.py

      - name: Upload macOS Binary to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/stem_checker
          asset_name: stem_checker_mac
          tag: ${{ github.ref_name }} # Use the branch/tag name
          overwrite: true
